name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Uses version from package.json "packageManager" field

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          # Dummy env vars for CI build (no real secrets). For deployment, use GitHub Secrets.
          # Add secrets at: Repo → Settings → Secrets and variables → Actions
          FIREBASE_PROJECT_ID: dummy
          FIREBASE_SERVICE_ACCOUNT: '{"project_id":"dummy","client_email":"dummy@dummy.iam.gserviceaccount.com","private_key":null}'
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: dummy
          NEXT_PUBLIC_FIREBASE_APP_ID: dummy
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          R2_ACCESS_KEY_ID: placeholder
          R2_SECRET_ACCESS_KEY: placeholder
          R2_ENDPOINT: https://placeholder.r2.cloudflarestorage.com
          R2_BUCKET_NAME: placeholder
          R2_PUBLIC_URL: https://placeholder.r2.dev
          COMBO_SK: placeholder
